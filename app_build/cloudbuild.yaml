steps:
  # Step 1: Build the Docker image using Google Container Registry (gcr.io) or Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg=API_KEY=${_API_KEY}'
      - '-t'
      - '${_IMAGE_REGISTRY}/${PROJECT_ID}/${_SERVICE_NAME}:${COMMIT_SHA}'
      - '.'

  # Step 2: Push the built image to the container registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_IMAGE_REGISTRY}/${PROJECT_ID}/${_SERVICE_NAME}:${COMMIT_SHA}'

  # Step 3: Deploy the image to Google Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=${_IMAGE_REGISTRY}/${PROJECT_ID}/${_SERVICE_NAME}:${COMMIT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'

# Specify the output images to be registered in Google Cloud Build artifacts
images:
  - '${_IMAGE_REGISTRY}/${PROJECT_ID}/${_SERVICE_NAME}:${COMMIT_SHA}'

# Define flexible substitution parameters that can be overridden at trigger run time
substitutions:
  _SERVICE_NAME: 'matkultranscrib'
  _REGION: 'asia-southeast2'
  _IMAGE_REGISTRY: 'gcr.io' # Set to 'gcr.io' or Artifact Registry such as 'asia-southeast2-docker.pkg.dev'
  _API_KEY: 'AIzaSyAFGYqFpuR_7m-Q_BEcr89VWbz1c2KKs_s' # Pass this securely during build execution

